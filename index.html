<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff0f3;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            max-width: 400px;
            width: 85%;
            z-index: 10;
        }

        h1 { color: #ff4d6d; font-family: 'Dancing Script', cursive; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #594e50; line-height: 1.6; font-size: 1.1rem; min-height: 60px; }

        .gif-container {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 50px;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .yes-btn { 
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white; 
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); 
        }

        .no-btn { 
            background-color: #eeeeee; 
            color: #888; 
            position: relative;
        }

        #reveal-section { display: none; }
        .reveal-text { font-size: 1.2rem; color: #c9184a; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="game-box">
    <div id="interactive-content">
        <div class="gif-container">
            <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMnc3Y3l0bjZ3ZzR2eXN5bm1oZ3YyYm96Ym96Ym96Ym96Ym96Ym96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/MDJ9IbxxvDUQM/giphy.gif" alt="Cute animation">
        </div>
        <h1 id="question-title">Hi! Quick question...</h1>
        <p id="sub-text">Are you ready to see something sweet?</p>
        
        <div class="btn-group">
            <button class="yes-btn" onclick="nextQuestion()">Yes!</button>
            <button class="no-btn" id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <div id="reveal-section">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbm52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3pueG52NWFycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L4lvBzeIlMlr70U7at/giphy.gif" alt="Final Surprise">
        </div>
        <h1>Yay! ❤️</h1>
        <p class="reveal-text">Since it's Unofficial Flowers Day, check your messages soon—there is a surprise coming your way!</p>
    </div>
</div>

<script>
    let currentStep = 0;
    
    const steps = [
        {
            q: "Are you feeling good today?",
            s: "I hope you are, because you deserve to!",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z0bnJzZ2V6bWZ6eG52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3AmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/S9oNGC1E42S3u/giphy.gif"
        },
        {
            q: "Do you know you're amazing?",
            s: "I just wanted to make sure you didn't forget.",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2YyNDM2NjlkYjYyZTQ3YmRjNDU1Njc4ZjA1YjYyZTQ3YmRjNDU1Njc4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/Y4S3YyN4Q0o6e3yN4O/giphy.gif"
        },
        {
            q: "Can I send you a little something?",
            s: "It's a small gesture to make you smile!",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueG52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3pueG52NWFycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif"
        }
    ];

    function moveNoButton() {
        const noBtn = document.getElementById('no-btn');
        
        // Moves the button randomly across the whole screen
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        
        noBtn.style.position = 'fixed';
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    function nextQuestion() {
        // Reset No button position for the next screen
        const noBtn = document.getElementById('no-btn');
        noBtn.style.position = 'relative';
        noBtn.style.left = '0px';
        noBtn.style.top = '0px';

        if (currentStep < steps.length) {
            document.getElementById('question-title').innerText = steps[currentStep].q;
            document.getElementById('sub-text').innerText = steps[currentStep].s;
            document.getElementById('main-gif').src = steps[currentStep].g;
            currentStep++;
        } else {
            showFinalReveal();
        }
    }

    function showFinalReveal() {
        document.getElementById('interactive-content').style.display = 'none';
        document.getElementById('reveal-section').style.display = 'block';
        document.body.style.backgroundColor = "#ffccd5";
    }
</script>

</body>
</html>
