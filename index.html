<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fdf2f8;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 85%;
            z-index: 10;
            position: relative;
        }

        h1 { color: #db2777; font-family: 'Dancing Script', cursive; font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #666; line-height: 1.5; font-size: 1.1rem; min-height: 50px; }

        .gif-container img {
            width: 100%;
            max-width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            height: 50px; /* Maintains layout when buttons move */
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .yes-btn { background-color: #ec4899; color: white; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); }
        .no-btn { 
            background-color: #f3f4f6; 
            color: #9ca3af; 
            position: relative;
            z-index: 999;
        }

        #reveal-section { display: none; }
        .reveal-text { font-size: 1.2rem; color: #be185d; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container" id="game-box">
    <div id="interactive-content">
        <div class="gif-container">
            <img id="main-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueG52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3pueG52NWFycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif" alt="Cute kitten">
        </div>
        <h1 id="question-title">Hi there!</h1>
        <p id="sub-text">I have a few questions for you... ready?</p>
        
        <div class="btn-group">
            <button class="yes-btn" onclick="nextQuestion()">Yes!</button>
            <button class="no-btn" id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>

    <div id="reveal-section">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbm52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3pueG52NWFycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/L4lvBzeIlMlr70U7at/giphy.gif" alt="Love">
        </div>
        <h1>Yay! ❤️</h1>
        <p class="reveal-text">Check your messages soon! Something special is coming your way just because you're you.</p>
    </div>
</div>

<script>
    let currentStep = 0;
    
    const steps = [
        {
            q: "Are you having a good day?",
            s: "I hope it's as bright as your smile!",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z0bnJzZ2V6bWZ6eG52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3AmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/S9oNGC1E42S3u/giphy.gif"
        },
        {
            q: "Do you know you're wonderful?",
            s: "Just double checking the facts here.",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2YyNDM2NjlkYjYyZTQ3YmRjNDU1Njc4ZjA1YjYyZTQ3YmRjNDU1Njc4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/Y4S3YyN4Q0o6e3yN4O/giphy.gif"
        },
        {
            q: "Are you ready for a surprise?",
            s: "It's almost time...",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmc3Y3l0bjZ3ZzR2eXN5bm1oZ3YyYm96Ym96Ym96Ym96Ym96Ym96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/C2yXWpS8pIFA36E63A/giphy.gif"
        },
        {
            q: "Can I send you something?",
            s: "It's a digital gift (for now)!",
            g: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHpueG52NWFycW9nd3F3Y3pueG52NWFycW9nd3F3Y3pueG52NWFycCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif"
        }
    ];

    function nextQuestion() {
        // Reset No button position for the next screen
        const noBtn = document.getElementById('no-btn');
        noBtn.style.position = 'relative';
        noBtn.style.left = '0px';
        noBtn.style.top = '0px';

        if (currentStep < steps.length) {
            document.getElementById('question-title').innerText = steps[currentStep].q;
            document.getElementById('sub-text').innerText = steps[currentStep].s;
            document.getElementById('main-gif').src = steps[currentStep].g;
            currentStep++;
        } else {
            showFinalReveal();
        }
    }

    function moveNoButton() {
        const noBtn = document.getElementById('no-btn');
        // Calculate random position within the viewport, with a small padding
        const padding = 50;
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
        
        noBtn.style.position = 'fixed';
        noBtn.style.left = `${x}px`;
        noBtn.style.top = `${y}px`;
    }

    function showFinalReveal() {
        document.getElementById('interactive-content').style.display = 'none';
        document.getElementById('reveal-section').style.display = 'block';
        document.body.style.backgroundColor = "#fce7f3";
    }
</script>

</body>
</html>
